{{/*
Secret-shaped application configuration, shared by web/websocket/
celery-worker/celery-beat/migration-job via envFrom. See values.yaml
`secrets:` block for the full explanation of what's required vs. optional.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ownfirebase.fullname" . }}-secrets
  labels:
    {{- include "ownfirebase.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Required — settings.py does `os.environ['DJANGO_SECRET_KEY']` with no
  # fallback, so the process crashes at import time without this.
  DJANGO_SECRET_KEY: {{ required "secrets.djangoSecretKey is required (Django will not start without it) — set it via --set secrets.djangoSecretKey=... or a values file. Generate one with: python -c \"import secrets; print(secrets.token_urlsafe(50))\"" .Values.secrets.djangoSecretKey | quote }}
  JWT_SIGNING_KEY: {{ (.Values.secrets.jwtSigningKey | default .Values.secrets.djangoSecretKey) | quote }}

  DATABASE_PASSWORD: {{ include "ownfirebase.databasePassword" . | quote }}
  MAINTENANCE_DATABASE_PASSWORD: {{ .Values.secrets.maintenanceDatabasePassword | quote }}

  AWS_ACCESS_KEY_ID: {{ include "ownfirebase.awsAccessKeyId" . | quote }}
  AWS_SECRET_ACCESS_KEY: {{ include "ownfirebase.awsSecretAccessKey" . | quote }}

  EMAIL_HOST_PASSWORD: {{ .Values.secrets.emailHostPassword | quote }}

  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}

  TWILIO_ACCOUNT_SID: {{ .Values.secrets.twilioAccountSid | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | quote }}

  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}

  FCM_SERVER_KEY: {{ .Values.secrets.fcmServerKey | quote }}
  VAPID_PRIVATE_KEY: {{ .Values.secrets.vapidPrivateKey | quote }}

  AI_PROVIDER_KEK: {{ .Values.secrets.aiProviderKek | quote }}

  SENTRY_DSN: {{ .Values.secrets.sentryDsn | quote }}

  {{- if .Values.postgresql.enabled }}
  # Consumed directly by the bundled postgres Deployment.
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
  {{- if .Values.minio.enabled }}
  # Consumed directly by the bundled minio Deployment.
  MINIO_ROOT_USER: {{ .Values.minio.auth.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.auth.rootPassword | quote }}
  {{- end }}
